<title>Certificate Gallery</title>

<style>


h1 {
    text-align: center;
    padding: 30px 0;
}

.gallery-container {
    width: 90%;
    margin: auto;

    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
}

.gallery-container img {
    width: 100%;
    border-radius: 10px;
    transition: 0.3s;
}

.gallery-container img:hover {
    transform: scale(1.05);
}

.back-btn {
    display: block;
    width: fit-content;
    margin: 30px auto;
    padding: 10px 20px;
    background: #00f7ff;
    color: black;
    text-decoration: none;
    border-radius: 6px;
}
</style>
</head>
